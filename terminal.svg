<svg width="100%" height="320" viewBox="0 0 800 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.7"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- FUNDO (AGORA EXPANDE TOTAL) -->
  <rect x="0" y="0" width="100%" height="320"
        rx="16"
        fill="#0a0f1a"
        stroke="#58A6FF"
        stroke-width="2"
        filter="url(#shadow)"/>

  <!-- HEADER -->
  <circle cx="30" cy="25" r="6" fill="#ff5f56"/>
  <circle cx="50" cy="25" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="25" r="6" fill="#27c93f"/>

  <!-- COMANDO -->
  <text x="20" y="70" fill="#58A6FF" font-family="monospace" font-size="16">
    $ cat thalles.profile
  </text>

  <!-- IDENTITY -->
  <text x="20" y="105" fill="#9da7b3" font-family="monospace" font-size="13">
    # identity
  </text>
  <text x="40" y="125" fill="#ffffff" font-family="monospace" font-size="14">
    19 · Petrolina, PE — Brazil
  </text>

  <!-- EDUCATION -->
  <text x="20" y="155" fill="#9da7b3" font-family="monospace" font-size="13">
    # education
  </text>
  <text x="40" y="175" fill="#ffffff" font-family="monospace" font-size="14">
    Computing Degree · Systems Development
  </text>

  <!-- STACK -->
  <text x="20" y="205" fill="#9da7b3" font-family="monospace" font-size="13">
    # stack
  </text>
  <text x="40" y="225" fill="#ffffff" font-family="monospace" font-size="14">
    React · Java · Python · Data · Open Source
  </text>

  <!-- LOOKING -->
  <text x="20" y="255" fill="#9da7b3" font-family="monospace" font-size="13">
    # looking_for
  </text>
  <text x="40" y="275" fill="#7ee787" font-family="monospace" font-size="14">
    projects · hackathons
  </text>

  <!-- CURSOR (AGORA CERTO NO FINAL DA LINHA) -->
  <rect x="245" y="262" width="10" height="16" fill="#58A6FF" filter="url(#glow)">
    <animate attributeName="opacity"
             values="1;0;1"
             dur="0.8s"
             repeatCount="indefinite"/>
  </rect>

</svg>
